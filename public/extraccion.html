    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Extracción - Azure AI Language</title>
        <style>
            body {
                font-family: sans-serif;
                margin: 20px;
                color: #000;
            }
            .contenedor-principal {
                display: flex;
                gap: 20px;
                margin-top: 15px;
            }
            .columna-izquierda {
                flex: 2;
            }
            .columna-derecha {
                flex: 1;
                border: 1px solid #000;
                padding: 10px;
            }
            textarea {
                width: 100%;
                box-sizing: border-box;
            }
            .checkbox-group {
                margin-top: 10px;
            }
            .checkbox-item {
                display: block;
                margin-bottom: 5px;
                cursor: pointer;
            }
            .seccion-boton {
                margin-top: 15px;
            }
            button {
                padding: 8px 15px;
                cursor: pointer;
                font-weight: bold;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
            }
            table, th, td {
                border: 1px solid #000;
            }
            th, td {
                padding: 8px;
                text-align: left;
            }
            th {
                background-color: #eee;
            }
            .mensaje-estado {
                font-style: italic;
                color: #555;
            }
        </style>
    </head>
    <body>

        <h1>Módulo:</h1>

        <div class="contenedor-principal">
            <div class="columna-izquierda">
                <label for="textoUsuario">Ingrese texto:</label><br><br>
                <textarea id="textoUsuario" rows="6" placeholder="Escriba aquí el texto a analizar..."></textarea>
            </div>

            <div class="columna-derecha">
                <b>Filtros de Datos Clave:</b>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" value="DateTime" class="filtro-entidad"> DateTime</label>
                    <label class="checkbox-item"><input type="checkbox" value="Organization" class="filtro-entidad"> Organization</label>
                    <label class="checkbox-item"><input type="checkbox" value="PersonType" class="filtro-entidad"> PersonType</label>
                    <label class="checkbox-item"><input type="checkbox" value="Location" class="filtro-entidad"> Location</label>
                    <label class="checkbox-item"><input type="checkbox" value="Person" class="filtro-entidad"> Person</label>
                    <label class="checkbox-item"><input type="checkbox" value="Quantity" class="filtro-entidad"> Quantity</label>
                </div>
            </div>
        </div>

        <div class="seccion-boton">
            <button id="btnEnviar">Analizar Frase</button>
        </div>

        <h3>Resultado de la IA:</h3>
        <div id="resultado">
            <p class="mensaje-estado">Esperando texto para analizar...</p>
        </div>

        <script src="./js/extraccion.js"></script>
    </body>
    </html>
